services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - BASE_MODEL_ID=deepseek-ai/deepseek-coder-6.7b-instruct
      - ADAPTER_PATH=artifacts/qlora_adapter
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]